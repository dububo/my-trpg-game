<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>終極遠征：九十日屠龍</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
    #setup, #game { max-width: 600px; margin: auto; }
    input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #555; color: #fff; }
    button { padding: 10px 20px; background: #ff4757; border: none; color: #fff; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <div id="setup">
    <h3>輸入 API Key (掛 VPN)</h3>
    <input type="password" id="key" placeholder="sk-or-v1-...">
    <button onclick="start()">開始冒險</button>
  </div>
  <div id="game" style="display:none;">
    <div id="log" style="height: 300px; overflow-y: scroll; border: 1px solid #333; padding: 10px;"></div>
    <input type="text" id="input" placeholder="下一步...">
    <button onclick="send()">執行</button>
  </div>

  <script>
    let k = "";
    function start() { k = document.getElementById('key').value; document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='block'; }
    async function send() {
      const msg = document.getElementById('input').value;
      document.getElementById('log').innerHTML += `<p>你: ${msg}</p>`;
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${k}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "anthropic/claude-3.5-sonnet",
          messages: [{role: "user", content: "你係DM，進行九十日屠龍記，請回應：" + msg}]
        })
      });
      const d = await res.json();
      document.getElementById('log').innerHTML += `<p>DM: ${d.choices[0].message.content}</p>`;
    }
  </script>
</body>
</html>
