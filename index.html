<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邊境飛地：九十日屠龍記 (正式穩定版)</title>
  <style>
    body { background-color: #1a1a1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .header { text-align: center; border-bottom: 2px solid #ff4757; padding-bottom: 10px; margin-bottom: 20px; }
    .setup-screen { background-color: #2a2a2a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .status-panel { display: none; justify-content: space-between; background: #2f3542; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; }
    .status-item { font-weight: bold; }
    .game-log { display: none; background-color: #222; border: 1px solid #444; border-radius: 8px; padding: 15px; height: 400px; overflow-y: auto; margin-bottom: 15px; }
    .dm-text { color: #4db8ff; margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; }
    .system-text { color: #ffcc00; font-weight: bold; margin-bottom: 10px; }
    .choice-container { display: none; margin-top: 15px; }
    .choice-btn { display: block; width: 100%; background: #2f3542; color: white; border: 1px solid #57606f; padding: 12px; margin-bottom: 8px; border-radius: 5px; text-align: left; cursor: pointer; font-size: 0.95rem; }
    .choice-btn:hover { background-color: #4b4d52; }
    .custom-input-area { display: flex; gap: 8px; margin-top: 10px; }
    input[type="text"], input[type="password"] { flex: 1; background: #222; border: 1px solid #57606f; color: white; padding: 12px; border-radius: 5px; }
    .btn { padding: 12px 24px; background-color: #ff4757; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .btn:disabled { background-color: #555; cursor: not-allowed; }
    .loading { display: none; text-align: center; color: #ffcc00; margin: 10px 0; }
  </style>
</head>
<body>

  <div class="header">
    <h2>⚔️ 邊境飛地：九十日屠龍記 ⚔️</h2>
  </div>

  <!-- 設定畫面 -->
  <div id="setupScreen" class="setup-screen">
    <h3>🔑 第一步：輸入 OpenRouter API 金鑰 (Key)</h3>
    <p style="font-size:0.85rem; color:#aaa;">*(正式穩定版：請貼上你申請的 sk-or-v1- 金鑰)*</p>
    <input type="password" id="apiKeyInput" placeholder="請貼上 sk-or-v1- 開頭的 Key...">
    
    <h3 style="margin-top:25px;">🎭 第二步：選擇你的冒險職業</h3>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <label><input type="radio" name="job" value="聖騎士" checked> 🛡️ 聖騎士 (高血量/守序)</label>
      <label><input type="radio" name="job" value="元素使"> 🔮 元素使 (高爆發/混亂)</label>
      <label><input type="radio" name="job" value="刺客"> 🗡️ 刺客 (高敏捷/亦正亦邪)</label>
    </div>
    <br>
    <button class="btn" style="width:100%;" onclick="startGame()">啟動九十日屠龍冒險 ➔</button>
  </div>

  <!-- 遊戲核心畫面 -->
  <div class="status-panel" id="statusPanel">
    <div class="status-item">⏳ 倒數：<span id="daysLeft">90</span> 天</div>
    <div class="status-item">❤️ 生命：<span id="hp">20</span>/20</div>
    <div class="status-item">🎭 傾向：<span id="alignment">中立 (0)</span></div>
  </div>

  <div class="game-log" id="gameLog"></div>
  <div class="loading" id="loadingIndicator">⌛ AI DM 正在瘋狂編寫世界劇情中...</div>

  <div class="choice-container" id="actionArea">
    <div id="choicesList"></div>
    <div class="custom-input-area">
      <input type="text" id="customInput" placeholder="輸入你的騷操作... (例如: 拋石仔引開守衛)">
      <button class="btn" id="submitBtn" onclick="sendAction('custom')">行動</button>
    </div>
  </div>

  <script>
    let gameState = { apiKey: "", job: "", days: 90, hp: 20, align: 0, history: [] };

    function startGame() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if(!key) return alert('請先輸入 OpenRouter API Key！');
      gameState.apiKey = key;
      gameState.job = document.querySelector('input[name="job"]:checked').value;

      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('statusPanel').style.display = 'flex';
      document.getElementById('gameLog').style.display = 'block';
      document.getElementById('actionArea').style.display = 'block';

      logSystem("冒險開始！正在生成世界序章...");
      sendAction("START_GAME");
    }

    function logSystem(text) {
      const log = document.getElementById('gameLog');
      log.innerHTML += `<div class="system-text"> [系統提示] ${text}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    async function sendAction(actionType) {
      const inputEl = document.getElementById('customInput');
      const submitBtn = document.getElementById('submitBtn');
      let userAction = "";

      if(actionType === 'custom') {
        userAction = inputEl.value.trim();
        if(!userAction) return;
        inputEl.value = "";
        const log = document.getElementById('gameLog');
        log.innerHTML += `<div style="color:#2ed573; margin-bottom:10px;">➔ 你選擇了：${userAction}</div>`;
      } else if (actionType === "START_GAME") {
        userAction = `我選擇了職業【${gameState.job}】，請開始遊戲序章，並給予我三個初始行動選項。`;
      } else {
        userAction = actionType;
        const log = document.getElementById('gameLog');
        log.innerHTML += `<div style="color:#2ed573; margin-bottom:10px;">➔ 你選擇了：${userAction}</div>`;
      }

      document.getElementById('loadingIndicator').style.display = 'block';
      submitBtn.disabled = true;

      const systemPrompt = `你是一位硬核的 TRPG 遊戲的主持人(DM)。目前玩家正在進行一場名為《九十日屠龍記》的生存冒險。
      當前遊戲狀態：剩餘天數:${gameState.days}天，玩家HP:${gameState.hp}/20，玩家道德傾向分數:${gameState.align} (正數為善，負數為惡)。
      
      請根據玩家接下來的行動，撰寫一段充滿細節、具有張力的小說情節描述。你必須在回應的最後，嚴格按照以下格式輸出系統結算資訊和三個接下來的行動選項（選項必須合理且符合情境，其中一定要包含瘋狂或幽默的騷操作）：
      
      [UPDATE_STATUS] 天數變更(-X), HP變更(-X或+X), 傾向變更(-X或+X)
      [OPTION 1] 選項一內容
      [OPTION 2] 選項二內容
      [OPTION 3] 選項三內容`;

      gameState.history.push({ role: "user", content: userAction });

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${gameState.apiKey}`,
            "Content-Type": "application/json",
            "HTTP-Referer": "https://vercel.com", 
            "X-Title": "TRPG Dragon Game"
          },
          body: JSON.stringify({
            model: "google/gemini-2.5-flash", 
            messages: [
              { role: "system", content: systemPrompt },
              ...gameState.history.map(h => ({ role: h.role, content: h.content }))
            ]
          })
        });

        const data = await response.json();
        if(!response.ok || !data.choices) throw new Error(data.error?.message || "呼叫失敗");

        const aiResponse = data.choices[0].message.content;
        gameState.history.push({ role: "assistant", content: aiResponse });

        parseAIResponse(aiResponse);

      } catch (error) {
        console.error(error);
        alert(`API 呼叫失敗，原因：${error.message}\n請檢查 Key 是否正確！`);
      } finally {
        document.getElementById('loadingIndicator').style.display = 'none';
        submitBtn.disabled = false;
      }
    }

    function parseAIResponse(text) {
      const log = document.getElementById('gameLog');
      
      let storyText = text;
      const statusRegex = /\[UPDATE_STATUS\](.*)/;
      const opt1Regex = /\[OPTION 1\](.*)/;
      const opt2Regex = /\[OPTION 2\](.*)/;
      const opt3Regex = /\[OPTION 3\](.*)/;

      const statusMatch = text.match(statusRegex);
      const opt1Match = text.match(opt1Regex);
      const opt2Match = text.match(opt2Regex);
      const opt3Match = text.match(opt3Regex);

      storyText = storyText.replace(/\[UPDATE_STATUS\].*/, '').replace(/\[OPTION \d\].*/g, '').trim();

      log.innerHTML += `<div class="dm-text">🎙️ <b>AI DM：</b>\n${storyText}</div>`;

      if(statusMatch) {
        const parts = statusMatch[1].split(',');
        parts.forEach(p => {
          if(p.includes('天數')) {
            const val = parseInt(p.match(/-?\d+/)[0]);
            gameState.days += val;
          } else if(p.includes('HP')) {
            const val = parseInt(p.match(/-?\d+/)[0]);
            gameState.hp = Math.max(0, Math.min(20, gameState.hp + val));
          } else if(p.includes('傾向')) {
            const val = parseInt(p.match(/-?\d+/)[0]);
            gameState.align += val;
          }
        });

        document.getElementById('daysLeft').innerText = gameState.days;
        document.getElementById('hp').innerText = gameState.hp;
        let alignText = "中立 (0)";
        if(gameState.align > 0) alignText = `善良 (+${gameState.align})`;
        if(gameState.align < 0) alignText = `邪惡 (${gameState.align})`;
        document.getElementById('alignment').innerText = alignText;
      }

      const choicesList = document.getElementById('choicesList');
      choicesList.innerHTML = "";
      
      if(opt1Match) appendChoiceButton(opt1Match[1].trim());
      if(opt2Match) appendChoiceButton(opt2Match[1].trim());
      if(opt3Match) appendChoiceButton(opt3Match[1].trim());

      log.scrollTop = log.scrollHeight;

      if(gameState.hp <= 0) {
        logSystem("💀 你在冒險中不幸喪生！遊戲結束。");
        document.getElementById('actionArea').style.display = 'none';
      } else if(gameState.days <= 0) {
        logSystem("⌛ 90 天期限已到！巨龍摧毀了世界，遊戲結束。");
        document.getElementById('actionArea').style.display = 'none';
      }
    }

    function appendChoiceButton(text) {
      const choicesList = document.getElementById('choicesList');
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerText = text;
      btn.onclick = () => sendAction(text);
      choicesList.appendChild(btn);
    }
  </script>
</body>
</html>
